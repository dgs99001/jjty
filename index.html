<script type="text/javascript">

<!-- 自定义客服按钮样式 -->
<style>
  .custom-chat-button {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    color: white;
    padding: 14px 20px;
    border-radius: 50px;
    box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    font-size: 15px;
    font-weight: 600;
    border: none;
    outline: none;
  }

  .custom-chat-button:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 25px rgba(16, 185, 129, 0.5);
    background: linear-gradient(135deg, #059669 0%, #047857 100%);
  }

  .custom-chat-button:active {
    transform: translateY(-1px);
  }

  .custom-chat-icon {
    width: 24px;
    height: 24px;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% {
      opacity: 1;
    }
    50% {
      opacity: 0.7;
    }
  }

  /* 隐藏默认的 tawk.to 悬浮按钮 */
  #tawk-bubble-container {
    display: none !important;
  }

  /* 移动端适配 */
  @media (max-width: 640px) {
    .custom-chat-button {
      bottom: 15px;
      right: 15px;
      padding: 12px 16px;
      font-size: 14px;
    }

    .custom-chat-icon {
      width: 20px;
      height: 20px;
    }
  }
</style>

<!-- 自定义客服按钮 -->
<script>
  window.addEventListener('load', function() {
    // 创建自定义按钮
    const chatButton = document.createElement('button');
    chatButton.className = 'custom-chat-button';
    chatButton.innerHTML = `
      <svg class="custom-chat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
      <span>在线客服</span>
    `;

    // 点击事件 - 打开 tawk.to 聊天窗口
    chatButton.addEventListener('click', function() {
      if (typeof Tawk_API !== 'undefined' && Tawk_API.maximize) {
        Tawk_API.maximize();
      }
    });

    // 添加到页面
    document.body.appendChild(chatButton);
  });
</script>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

  </body>
